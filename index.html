<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel='shortcut icon' type='image/x-icon' href='favicon.ico'>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pac-Man Game</title>
  <link rel="stylesheet" href="static/style.css">

</head>
<body>
  <img src="static/Images/Pac-Man-0.webp"  class="limg" >
  <div id="game-container"></div>
  <audio id="score_sound" src="/static/sound/Death.mp3"></audio>
  <div id="score">
    Score: <span id="score-display">0</span> 
  </div>
  <div id="safeTimerDisplay">00:00</div>

  <div id="game-over-screen">
    <img src="static/Images/OIG1.jpg" class="game-over-img">
    <h1>Game Over</h1>
    <h1>Sorry, you've lost the game.</h1>
   <a href="/"><button id="play-again-button">Home Page</button></a>
  </div>

  <div id="game-win">
    <img src="static/Images/OIG2.jpg"  class="small-img" >
    <h1>Game Win</h1>
    <p>You are a monster, you are the strongest, fuck everyone!</p>
     <a href="/" ><button id="play-win-but">Home Page</button> </a>
  </div>
  <script src="static/index.js?v=1.8"></script>
  <div id="souls-display">Soul: 3</div>

</body>
</html>
